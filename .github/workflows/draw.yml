name: Draw Keymap
on:
  push:
    paths:
      - 'config/keymap.keymap'
      - 'config.yaml'
      - 'info.json'
  workflow_dispatch: # 手動実行ボタンも追加しておきます

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw
        run: |
          # 1. 解析：configフォルダ内のkeymapファイルを読み込みます
          keymap parse -z config/keymap.keymap > keymap_data.yaml

          # 2. 描画：configフォルダ内のinfo.jsonを明示的に指定します
          keymap -c config.yaml draw -j config/info.json keymap_data.yaml > keymap_display.svg

      - name: Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap_display.svg
          git commit -m "Update keymap SVG" || exit 0
          git push
