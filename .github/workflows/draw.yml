name: Draw Keymap
on:
  push:
    paths:
      - 'config/keymap.keymap'
      - 'config.yaml'
      - 'info.json'
  workflow_dispatch: # 手動実行ボタンも追加しておきます

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw
        run: |
          # 1. あなたのフォルダ構成に合わせた解析
          keymap parse -c config.yaml --qmk-json info.json -z config/keymap.keymap > keymap_data.yaml
          # 2. 解析したデータから画像を作成
          keymap draw -c config.yaml keymap_data.yaml > keymap_display.svg

      - name: Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap_display.svg
          git commit -m "Update keymap SVG" || exit 0
          git push
